# config/app_repo_mapping.yaml
#
# ⚠️  THIS FILE IS NO LONGER USED.
#
# Application → Repository mappings are now managed dynamically through the
# Team Admin UI:
#
#   Team Admin → Project Configuration → 📂 Repo Mappings
#
# Mappings are stored per-project in the database (encrypted at rest) and
# loaded at runtime via:
#   storage.auth_store.get_app_repo_mapping(project_id)
#
# To migrate existing mappings from this file:
#   1. Log in as Team Admin.
#   2. Navigate to Team Admin → Project Configuration → Repo Mappings.
#   3. Add each app_name → repo mapping using the UI form.
#   4. Click "Save Repo Mappings".
#
# No entries in this file will be read by the application.
