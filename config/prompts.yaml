# LLM Prompt Templates for Agent Nodes

root_cause_analysis: |
  You are an expert DevOps engineer specializing in MuleSoft and CloudHub 2.0 troubleshooting.
  
  Analyze the following error and provide a comprehensive Root Cause Analysis (RCA) in 400-500 words.
  
  ERROR DETAILS:
  Application: {app_name}
  Environment: {environment}
  Error Title: {error_title}
  
  ERROR MESSAGE:
  {error_message}
  
  STACK TRACE:
  {stack_trace}
  
  Provide your RCA following this structure:
  1. **Summary** (2-3 sentences): What went wrong and immediate impact
  2. **Root Cause** (detailed): Technical explanation of why this error occurred
  3. **Affected Components**: List Mule flows, connectors, or services impacted
  4. **Contributing Factors**: Configuration issues, data problems, or environmental factors
  5. **Recommended Solution**: High-level fix strategy
  6. **Prevention**: How to avoid this in future
  
  Be specific, technical, and actionable. Focus on MuleSoft-specific patterns.

code_fix_generation: |
  You are an expert MuleSoft developer tasked with fixing a production error.
  
  CONTEXT:
  Error: {error_title}
  RCA Summary: {rca_summary}
  
  AFFECTED FILES:
  {affected_files}
  
  CODE TO FIX:
  {code_content}
  
  Generate a precise code fix that:
  1. Addresses the root cause identified in the RCA
  2. Follows MuleSoft best practices (error handling, null checks, proper scoping)
  3. Is minimal and focused (don't refactor unrelated code)
  4. Includes inline comments explaining the fix
  5. Maintains backward compatibility
  
  Provide your response in this exact format:
  
  ## Original Code (with context)
  ```xml
  [relevant original code showing the problematic section with surrounding context]
  ```
  
  ## Fixed Code (with same context)
  ```xml
  [same code section but with the fix applied]
  ```
  
  ## Explanation
  [2-3 paragraphs explaining what was changed and why]
  
  ## Testing Recommendations
  - [Test case 1]
  - [Test case 2]
  - [Test case 3]

fix_quality_reflection: |
  You are a senior code reviewer evaluating an AI-generated fix for a Mule application error.
  
  ORIGINAL ERROR:
  {error_description}
  
  PROPOSED FIX (changes only):
  {proposed_fix}
  
  KEY CONTEXT FROM ORIGINAL CODE:
  {original_code_snippet}
  
  Evaluate this fix on the following criteria:
  1. **Correctness** (0-10): Does it actually solve the root cause?
  2. **Safety** (0-10): Could it introduce new bugs or break existing functionality?
  3. **Code Quality** (0-10): Does it follow best practices?
  4. **Completeness** (0-10): Are all edge cases handled?
  
  Provide ONLY valid JSON (no markdown, no extra text):
  {
    "correctness_score": <0-10>,
    "safety_score": <0-10>,
    "code_quality_score": <0-10>,
    "completeness_score": <0-10>,
    "overall_score": <0-1 float>,
    "concerns": ["concern 1", "concern 2"],
    "recommendation": "APPROVE" or "REJECT",
    "reasoning": "brief explanation"
  }

github_pr_description: |
  Generate a professional GitHub Pull Request description for an AI-generated bug fix.
  
  ERROR: {error_title}
  
  RCA SUMMARY:
  {rca_summary}
  
  FIX EXPLANATION:
  {fix_explanation}
  
  JIRA TICKET: {jira_ticket_key}
  
  Generate a PR description following this template:
  
  ## 🤖 AI-Generated Fix
  
  ### Problem
  [2-3 sentences describing the error and its impact]
  
  ### Root Cause
  [Brief technical explanation]
  
  ### Solution
  [What this PR changes and how it fixes the issue]
  
  ### Testing
  - [ ] Unit tests pass
  - [ ] Integration tests pass
  - [ ] Manual testing in dev environment
  
  ### Related Links
  - Jira: [{jira_ticket_key}]({jira_url})
  - RCA Report: [Download PDF]
  
  ### ⚠️ AI-Generated
  This fix was automatically generated by our intelligent monitoring system. Please review carefully before merging.
  
  /cc @devops-team

jira_ticket_description: |
  Create a Jira ticket description for the following production error.
  
  Application: {app_name}
  Environment: {environment}
  Error: {error_title}
  Severity: {severity}
  
  SHORT RCA:
  {rca_summary}
  
  Format as:
  
  h2. Error Details
  * *Application:* {app_name}
  * *Environment:* {environment}
  * *Severity:* {severity}
  * *First Detected:* {timestamp}
  
  h2. Error Message
  {code}
  {error_message}
  {code}
  
  h2. Root Cause Analysis
  {rca_summary}
  
  h2. Recommended Action
  [Based on RCA, suggest immediate steps]
  
  h2. Attachments
  * RCA Report (PDF)
  * Error logs
  * Proposed fix (.patch) - if generated

slack_alert_message: |
  Format a Slack alert for this error (use Slack markdown):
  
  Error: {error_title}
  App: {app_name}
  Environment: {environment}
  Severity: {severity}
  
  Keep it concise (<200 words) but informative. Include emoji for severity.
  Add link to Jira ticket if available.
